<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>
<link rel="stylesheet" href="../CSS/about.css">
</head>

<body class="about_body">

<div class="form">

    <h2>Login</h2>
    
    <div class="form_menu">
        <label for="username">Email</label>
        <input type="email" id="username" placeholder="Enter your email">
    </div>

    <div class="form_menu">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>

    <div class="form_check">
        <input type="checkbox" id="show">
        <label for="show">Show Password</label>
    </div>
    <div>
            <textarea rows="4" cols="20" placeholder="Any Message"></textarea>
        </div>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3533.728545961915!2d83.46305627428389!3d27.66386907620753!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x399685b9d3b900d9%3A0xdb0d4a8fa971b25d!2sISMT%20College%20Butwal%2C%20Butwal!5e0!3m2!1sen!2snp!4v1777952875629!5m2!1sen!2snp" width="150" height="100" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        <div>
            <video width="350" height="200" autoplay muted controls>
                <source src="../RESOURCES/About Her ❤️.mp4" type="video/mp4">
            </video>
        </div>
    <div class="form_menu">
        <button>Sign In</button>
        <div class="animation_button"></div>
    </div>

    <div class="extra_links">
        <a href="#">Forgot Password?</a>
        <a href="register.html">Create Account</a>
    </div>
    <div class="animation_button"></div>

</div>

</body>
</html>
